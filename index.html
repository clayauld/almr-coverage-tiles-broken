<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ALMR Terrain Coverage Tiles</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body, #map { height: 100%; margin: 0; }
    .legend { background: #fff; padding: 8px 10px; font: 12px/1.4 sans-serif;
              border-radius: 6px; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .legend i { display: inline-block; width: 12px; height: 12px; margin-right: 6px; opacity: .7; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map('map').setView([62.5, -150.0], 5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
      { maxZoom: 17, attribution: '© OpenStreetMap' }).addTo(map);
    L.tileLayer('almr_tiles/{z}/{x}/{y}.png',
      { minZoom: 6, maxZoom: 16, maxNativeZoom: 12, opacity: 0.75,
        attribution: 'ALMR terrain LOS coverage' }).addTo(map);

    var legend = L.control({ position: 'bottomright' });
    legend.onAdd = function () {
      var d = L.DomUtil.create('div', 'legend');
      d.innerHTML = '<b>ALMR Signal Strength</b><br>' +
        '<i style="background:#e31a1c"></i>&ge; -50 dBm (Strongest)<br>' +
        '<i style="background:#ff7f00"></i>-50 to -65 dBm (Strong)<br>' +
        '<i style="background:#33a02c"></i>-65 to -80 dBm (Good)<br>' +
        '<i style="background:#1f78b4"></i>-80 to -95 dBm (Moderate)<br>' +
        '<i style="background:#984ea3"></i>-95 to -116 dBm (Fringe)';
      return d;
    };
    legend.addTo(map);
  </script>
</body>
</html>
